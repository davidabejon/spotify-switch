<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Switch - Autenticacion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    h1 { color: #1DB954; font-size: 2rem; margin-bottom: 6px; }
    .subtitle { color: #aaa; margin-bottom: 40px; }
    .card {
      background: #1a1a1a;
      border: 2px solid #1DB954;
      border-radius: 16px;
      padding: 32px 40px;
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    .label { color: #aaa; font-size: 0.9rem; margin-bottom: 16px; }
    .code {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      word-break: break-all;
      background: #111;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      color: #fff;
      user-select: all;
    }
    .hint {
      background: #282828;
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 0.9rem;
      color: #ccc;
      margin-top: 24px;
    }
    .hint strong { color: #1DB954; }
    .error-card {
      background: #1a1a1a;
      border: 2px solid #e74c3c;
      border-radius: 16px;
      padding: 32px 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .error-title { color: #e74c3c; font-size: 1.2rem; margin-bottom: 12px; }
    .error-desc { color: #ccc; }
    .empty { color: #888; }
  </style>
</head>
<body>
  <h1>Spotify Switch</h1>
  <p class="subtitle">Autenticacion OAuth</p>
  <div id="root"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const root = document.getElementById('root');

    if (params.has('error')) {
      root.innerHTML = `
        <div class="error-card">
          <div class="error-title">Error: ${escapeHtml(params.get('error'))}</div>
          <div class="error-desc">${escapeHtml(params.get('error_description') || 'Autorizacion denegada.')}</div>
        </div>`;
    } else if (params.has('code')) {
      const code = params.get('code');
      root.innerHTML = `
        <div class="card">
          <div class="label">Introduce este codigo en tu Nintendo Switch:</div>
          <div class="code">${escapeHtml(code)}</div>
          <div class="hint">
            En la Switch, pulsa <strong>"Introducir codigo"</strong> y escribe el codigo de arriba.
          </div>
        </div>`;
    } else {
      root.innerHTML = '<p class="empty">No se encontro ningun codigo de autorizacion en la URL.</p>';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
